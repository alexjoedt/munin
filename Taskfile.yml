version: '3'

vars:
  BINARY: munin

tasks:
  tidy:
    cmds:
      - go fmt ./...
      - go mod tidy

  test:
    cmds:
      - go test --cover ./...
      - go mod verify

  build:
    cmds:
      - go mod verify
      - go build -o bin/{{.BINARY}} ./cmd/server/main.go

  run:
    cmds:
      - task: build
      - ./bin/{{.BINARY}}

  proto:install:
    desc: Install protoc plugins required for proto generation
    cmds:
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
      - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

  proto:
    desc: Generate Go code from proto files (run 'task proto:install' first)
    cmds:
      - protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative proto/*.proto

  clean:
    cmds:
      - rm -rf bin