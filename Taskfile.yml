version: '3'

vars:
  BINARY: munin

tasks:
  tidy:
    cmds:
      - go fmt ./...
      - go mod tidy

  test:
    cmds:
      - go test --cover ./...
      - go mod verify

  build:
    cmds:
      - go mod verify
      - go build -o bin/{{.BINARY}} ./cmd/server/main.go

  run:
    cmds:
      - task: build
      - ./bin/{{.BINARY}}

  proto:
    desc: Generate Go code from proto files
    cmds:
      - protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative proto/*.proto

  clean:
    cmds:
      - rm -rf bin